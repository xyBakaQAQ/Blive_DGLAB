# Bilibili 直播间配置
bilibili:
  room_id: 1796101901
  sessdata: ""

# DG-Lab 控制器配置
dglab:
  controller_url: "http://127.0.0.1:8920"
  controller_id: "all"

# 弹幕触发配置
# duration 支持秒（如 "10s"）、分钟（如 "2m"）、混合（如 "1m30s"）
danmaku:
  enabled: true
  strength_add: 1
  duration: "5s"
  rate_limit:
    per: "1m"            # 每多长时间重置一次计数
    max_triggers: 5      # 该时间内同一用户最多触发次数
  # 舰长/提督/总督发弹幕时的额外强度叠加（在基础 strength_add 之上再加）
  guard_bonus:
    enabled: true
    3: # 舰长
      strength_add: 2
      duration: "2s"
    2: # 提督
      strength_add: 4
      duration: "3s"
    1: # 总督
      strength_add: 6
      duration: "5s"

# 互动事件触发配置（进房间、关注等）
interact:
  enter:           # 进入房间 (msg_type=1)
    enabled: false
    strength_add: 1
    duration: "2s"
  follow:          # 关注主播 (msg_type=2)
    enabled: true
    strength_add: 3
    duration: "3s"
  share:           # 分享直播间 (msg_type=3)
    enabled: true
    strength_add: 4
    duration: "4s"
  special_follow:  # 特别关注 (msg_type=4)
    enabled: true
    strength_add: 5
    duration: "5s"

# 金瓜子礼物档位（total_coin / 1000 = 元）
gift:
  enabled: true
  tiers:
    - min_price: 0.1
      strength_add: 5
      duration: "3s"
    - min_price: 1.0
      strength_add: 8
      duration: "5s"
    - min_price: 5.0
      strength_add: 12
      duration: "8s"
    - min_price: 10.0
      strength_add: 16
      duration: "10s"
    - min_price: 30.0
      strength_add: 20
      duration: "15s"
    - min_price: 50.0
      strength_add: 25
      duration: "20s"
    - min_price: 100.0
      strength_add: 30
      duration: "30s"

# 醒目留言档位（price 直接是元）
super_chat:
  enabled: true
  tiers:
    - min_price: 30
      strength_add: 15
      duration: "10s"
    - min_price: 50
      strength_add: 20
      duration: "15s"
    - min_price: 100
      strength_add: 25
      duration: "20s"
    - min_price: 500
      strength_add: 35
      duration: "1m"

# 舰长档位（按 guard_level 直接配置）
guard:
  enabled: true
  levels:
    3:  # 舰长 ¥198/月
      strength_add: 20
      duration: "30s"
    2:  # 提督 ¥1998/月
      strength_add: 30
      duration: "1m"
    1:  # 总督 ¥19998/月
      strength_add: 40
      duration: "1m30s"

# 日志配置
log:
  level: "INFO"
  show_unknown_cmd: false
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DG-Lab Bilibili 控制面板</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="sidebar">
        <h1>🎮 DG-Lab</h1>
        <div class="nav">
            <a href="/" class="active">📊 首页</a>
            <a href="/config.html">⚙️ 配置</a>
            <a href="/obs.html">🎬 OBS</a>
        </div>
    </div>
    
    <div class="main-content">
        <div class="container">
        
        <div class="card">
            <h2>📊 状态</h2>
            <div class="config-grid">
                <div class="config-item">
                    <div class="config-label">直播间</div>
                    <div class="config-value" id="room-id">-</div>
                </div>
                <div class="config-item">
                    <div class="config-label">控制器</div>
                    <div class="config-value" id="controller-id">-</div>
                </div>
                <div class="config-item">
                    <div class="config-label">连接状态</div>
                    <div class="config-value">
                        <span class="status online" id="status">运行中</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="logs-grid">
            <div class="card">
                <h2>📝 弹幕日志</h2>
                <div id="danmaku-logs" class="logs-container"></div>
            </div>
            
            <div class="card">
                <h2>🎮 郊狼日志</h2>
                <div id="dglab-logs" class="logs-container"></div>
            </div>
        </div>
        </div>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
